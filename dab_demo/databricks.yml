# This is a Databricks asset bundle definition for dab_demo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_demo
  uuid: 9f0f8fd2-26b1-4149-affd-2e446b2d5219

include:
  - resources/*.yml
  - resources/*/*.yml

resources:
  # We can also define resources directly in this file. This is useful for small bundles with few resources.
  # For larger bundles, it's better to split resources into separate files and include them as shown above.
  jobs:
    demo_job_dab:
      name: demo_job_dab
      tasks:
        - task_key: test_dab
          notebook_task:
            notebook_path: /resources/notebooks/demo_dab_test
            source: WORKSPACE
          environment_key: Default
      git_source:
        git_url: https://github.com/databricks/dab_demo.git

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e7714ffb-8b1a.cloud.databricks.com
    variables:
      catalog: dev
      schema: bronze
  tst:
    default: false
    workspace:
      host: https://dbc-e7714ffb-8b1a.cloud.databricks.com
    variables:
      catalog: tst
      schema: bronze
  prod:
    mode: production
    workspace:
      host: https://dbc-e7714ffb-8b1a.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/joserahul98@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/joserahul98@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev
      schema: prod
    permissions:
      - user_name: joserahul98@gmail.com
        level: CAN_MANAGE
