resources:
  jobs:
    demo_job_dab:
      name: demo_job_dab
      tasks:
        - task_key: test_dab
          notebook_task:
            notebook_path: /resources/notebooks/demo_dab_test
            source: WORKSPACE
          environment_key: Default
      git_source:
        git_url: https://github.com/joserahul/Jose_databricks_demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
